Xie Bing:
  name: 谢冰
  key: Xie Bing
  identity_type: 教授
  identity_type_note: 杰青
  grade: ''
  avatar_big: xie-bing.jpeg
  avatar_small: xie-bing.jpeg
  bio: 北京大学信息科学技术学院教授、国家杰出青年基金获得者
  profile_md: "## 个人简介\r\n\r\n谢冰，1970年生于湖南省。现任北京大学信息科学技术学院常务副院长，软件研究所所长，教授，国家杰出青年基金获得者，入选教育部新世纪优秀人才计划、北京市科技新星计划，获\"\
    中创软件人才奖\"。\r\n\r\n作为课题负责人，先后承担了国家863计划、科技支撑计划、国家重点专项、北京市科委重点课题、国家自然科学基金委杰出青年基金等重点项目9项，参与973、863计划、基金重点等课题5项。在软件工程技术研发和国产软件工具研发与产业化方面做出了重要的贡献，主要成果在软件行业、信息服务业、国防军工领域、集成电路设计领域中广泛应用。在FSE、POPL等软件工程与程序语言领域顶级会议、主流会议和期刊上发表论文80余篇。\r\
    \n\r\n---\r\n\r\n## 科研/教育经历\r\n\r\n- **1998年**：博士，国防科技大学\r\n\r\n---\r\n\r\n##\
    \ 主要荣誉与获奖\r\n\r\n| 年份 | 奖项 | 成果 |\r\n|:---:|:---|:---|\r\n| 2015 | 国家技术发明二等奖（排名第2）\
    \ | 基于网络的软件开发群体化方法及核心技术 |\r\n| 2012 | 教育部高等学校科学技术进步一等奖（排名第1） | 可信软件资源生产与共享环境Trustie-TSE\
    \ |\r\n| 2009 | 北京市科学技术奖技术发明类二等奖（排名第1） | 青鸟软件质量保证支撑工具体系 |\r\n| 2006 | 国家科技进步二等奖（排名第3）\
    \ | 基于Internet、以构件库为核心的软件开发平台 |\r\n\r\n---\r\n\r\n## 社会兼职\r\n\r\n- 中国软件行业协会理事\r\
    \n- 中国计算机学会高级会员\r\n- 电子学报英文版编委\r\n\r\n---\r\n\r\n## 联系方式\r\n\r\n- 邮箱：xiebing@pku.edu.cn\r\
    \n- 地址：北京大学\r\n\r\n<style>\r\ntable {\r\n  width: 100%;\r\n  border-collapse:\
    \ collapse;\r\n  margin: 15px 0;\r\n}\r\nth, td {\r\n  border: 1px solid #ddd;\r\
    \n  padding: 10px;\r\n  text-align: left;\r\n}\r\nth {\r\n  background-color:\
    \ #f5f5f5;\r\n  width: 100px;\r\n}\r\nsection {\r\n  margin-bottom: 30px;\r\n\
    }\r\n</style>"
  employer: 北京大学信息科学技术学院
  email: xiebing@pku.edu.cn
  github: ''
  orcid: ''
  googlescholar: ''
  research: "软件工程\r\n计算机科学理论\r\n分布式系统"
  project: ''
  order: 1
